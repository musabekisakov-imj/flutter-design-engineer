name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  repository:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 scripts/validate_repository.py
      - run: python3 -m unittest discover -s tests -v

  flutter-demo:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/booking-redesign/demo
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test --exclude-tags golden
